name: Scheduled PR Review Merge

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report merge-ready PRs without merging"
        required: false
        default: false
        type: boolean
      require_approval:
        description: "Require reviewDecision=APPROVED before merging"
        required: false
        default: true
        type: boolean

concurrency:
  group: scheduled-pr-review-merge
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  review-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Process approved pull requests
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
          REQUIRE_APPROVAL: ${{ github.event_name != 'workflow_dispatch' || inputs.require_approval }}
        run: |
          mode_flag="--merge"
          if [ "$DRY_RUN" = "true" ]; then
            mode_flag="--dry-run"
          fi

          approval_flag="--require-approval"
          if [ "$REQUIRE_APPROVAL" = "false" ]; then
            approval_flag=""
          fi

          python3 scripts/pr_review_merge.py \
            --repo "$REPOSITORY" \
            "$mode_flag" \
            $approval_flag
