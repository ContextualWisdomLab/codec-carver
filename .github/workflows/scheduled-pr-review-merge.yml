name: Scheduled PR Review Merge

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report merge-ready PRs without merging"
        required: false
        default: false
        type: boolean
      require_approval:
        description: "Require reviewDecision=APPROVED before merging"
        required: false
        default: true
        type: boolean
      auto_approve:
        description: "Approve PRs with no non-review blockers before merging"
        required: false
        default: false
        type: boolean

concurrency:
  group: scheduled-pr-review-merge
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read
  id-token: write

jobs:
  review-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Exchange OpenCode app token for review writes
        id: opencode_app_token
        env:
          OIDC_AUDIENCE: opencode-github-action
          OPENCODE_API_BASE_URL: https://api.opencode.ai
        run: |
          set -euo pipefail

          unavailable() {
            echo "available=false" >>"$GITHUB_OUTPUT"
          }

          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "OpenCode app token exchange unavailable: OIDC request environment is missing."
            unavailable
            exit 0
          fi

          request_url="${ACTIONS_ID_TOKEN_REQUEST_URL}"
          separator="&"
          case "$request_url" in
            *\?*) ;;
            *) separator="?" ;;
          esac

          if ! oidc_response="$(
            curl -fsS \
              -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${request_url}${separator}audience=${OIDC_AUDIENCE}"
          )"; then
            echo "OpenCode app token exchange unavailable: OIDC token request did not complete."
            unavailable
            exit 0
          fi

          oidc_token="$(jq -r '.value // empty' <<<"$oidc_response")"
          if [ -z "$oidc_token" ]; then
            echo "OpenCode app token exchange unavailable: OIDC token response was empty."
            unavailable
            exit 0
          fi

          if ! token_response="$(
            curl -fsS \
              -X POST \
              -H "Authorization: Bearer ${oidc_token}" \
              "${OPENCODE_API_BASE_URL}/exchange_github_app_token"
          )"; then
            echo "OpenCode app token exchange unavailable: app token request did not complete."
            unavailable
            exit 0
          fi

          app_token="$(jq -r '.token // empty' <<<"$token_response")"
          if [ -z "$app_token" ]; then
            echo "OpenCode app token exchange unavailable: app token response was empty."
            unavailable
            exit 0
          fi

          echo "::add-mask::$app_token"
          {
            echo "available=true"
            echo "token=$app_token"
          } >>"$GITHUB_OUTPUT"

      - name: Process review-ready pull requests
        env:
          GH_TOKEN: ${{ steps.opencode_app_token.outputs.token || secrets.OPENCODE_APPROVE_TOKEN || github.token }}
          REPOSITORY: ${{ github.repository }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
          REQUIRE_APPROVAL: ${{ github.event_name != 'workflow_dispatch' || inputs.require_approval }}
          AUTO_APPROVE: ${{ github.event_name == 'workflow_dispatch' && inputs.auto_approve }}
        run: |
          mode_flag="--merge"
          if [ "$DRY_RUN" = "true" ]; then
            mode_flag="--dry-run"
          fi

          approval_flag="--require-approval"
          if [ "$REQUIRE_APPROVAL" = "false" ]; then
            approval_flag=""
          fi

          auto_approve_flag="--auto-approve"
          if [ "$AUTO_APPROVE" = "false" ]; then
            auto_approve_flag=""
          fi

          python3 scripts/pr_review_merge.py \
            --repo "$REPOSITORY" \
            "$mode_flag" \
            $approval_flag \
            $auto_approve_flag
