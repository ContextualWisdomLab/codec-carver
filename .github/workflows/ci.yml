name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: this workflow only needs to read the repository.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install package (with web + mcp extras)
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements-lock.txt
          python -m pip install --disable-pip-version-check --no-index --no-deps --no-build-isolation -e .

      - name: Compile check
        run: python -m py_compile media_shrinker.py presets.py saas_web.py mcp_driver.py job_store.py

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Verify console entry point
        run: codec-carver --help
