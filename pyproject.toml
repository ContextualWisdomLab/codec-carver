[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "def ",
    "class ",
    "import ",
    "from ",
    "except",
    "logger",
    "raise ",
    "return ",
    "if ",
    "elif ",
    "else:",
    "for ",
    "while ",
    "with ",
    "try:",
    "finally:",
    "yield ",
    "continue",
    "break",
    "pass",
    "print",
    "@",
    "=",
]

[tool.interrogate]
ignore-module = true
ignore-magic = true
ignore-private = true
ignore-property-decorators = true
ignore-setters = true
ignore-init-method = true
exclude = ["tests", "scripts", "media_shrinker.py", "saas_web.py", "mcp_driver.py"]
fail-under = 100
