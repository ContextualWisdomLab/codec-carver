[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "codec-carver"
version = "0.1.0"
description = "Carve long recordings into metadata-preserved, size-capped FLAC/Opus files."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Seongho Bae" }]
keywords = ["audio", "flac", "opus", "ffmpeg", "compression", "archival", "transcription"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Topic :: Multimedia :: Sound/Audio :: Conversion",
    "Topic :: System :: Archiving :: Compression",
    "Environment :: Console",
]
# The CLI core depends only on the Python standard library plus the external
# `ffmpeg`/`ffprobe` binaries. Optional surfaces pull their own dependencies.
dependencies = []

[project.optional-dependencies]
web = ["fastapi>=0.110", "uvicorn>=0.29", "python-multipart>=0.0.9", "aiofiles>=23", "httpx>=0.27"]
mcp = ["mcp>=1.0"]
dev = ["interrogate>=1.7"]
all = [
    "fastapi>=0.110", "uvicorn>=0.29", "python-multipart>=0.0.9", "aiofiles>=23", "httpx>=0.27",
    "mcp>=1.0",
]

[project.urls]
Homepage = "https://github.com/Seongho-Bae/codec-carver"
Repository = "https://github.com/Seongho-Bae/codec-carver"

[project.scripts]
codec-carver = "media_shrinker:main"

[tool.setuptools]
py-modules = ["media_shrinker", "saas_web", "mcp_driver"]

[tool.interrogate]
fail-under = 100
exclude = [
    "scripts",
    "tests",
    "fuzz",
]
